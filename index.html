<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form class="login">
  <h2>Welcome, back!</h2>
  <p>Please Register before log in</p>
   <label for="email">Email:</label>
            <input type="email" id="loginEmail" name="email" placeholder="example@gmail.com" autocomplete="on" required />
   <label for="password">Password:</label>
            <input type="password" id="loginPassword" name="password" placeholder="Password" autocomplete="on" required />
  <input type="submit" id="loginBtn" value="Log In" />
  <div class="links">
    <a href="#">Forgot password</a>
    <a href="register.html">Register</a>
  </div>
</form>
<script src="logic.js"></script>
</body>
</html>
